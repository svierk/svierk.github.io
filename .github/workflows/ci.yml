name: Validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Node Version
        uses: svierk/get-node-version@main

      - name: Install Dependencies
        run: npm ci

      - name: Build with Astro
        run: npm run build
        env:
          # Used at build time to fetch current repo star counts.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
